name: EnrichEpisodes

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max episodes to process (0 = all)'
        required: false
        default: '0'
      min_quality:
        description: 'Skip episodes with overall_quality >= this value (default 80)'
        required: false
        default: '80'
      dry_run:
        description: 'Dry run - no writes'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install anthropic requests

      - name: Run enrichment
        env:
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE }}
        run: |
          ARGS="--min-quality ${{ inputs.min_quality }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ "${{ inputs.limit }}" != "0" ]; then ARGS="$ARGS --limit ${{ inputs.limit }}"; fi
          python3 scripts/enrich_episodes.py $ARGS

      - name: Rebuild site
        if: ${{ inputs.dry_run != 'true' }}
        run: python3 build.py

      - name: Commit and push
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          git config user.name  "Conan Fan Map Bot"
          git config user.email "bot@users.noreply.github.com"
          if git diff --quiet HEAD; then
            echo "No changes to commit."
          else
            git add data/rich_data.json data/enrich_log.json dist/index.html dist/.build_ts
            git commit -m "Enrich episodes: summaries, structured Q&A, highlights_v2"
            git push origin main
          fi
